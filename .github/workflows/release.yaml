name: Release native version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v2.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  create-gh-release:
    needs:
      - release-meta
      - release-validation
    runs-on: ubuntu-latest
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: Sync2 ${{ needs.release-meta.outputs.tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-validation:
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install native headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build SPA
        run: npm run build

      - name: Build PWA
        run: npm run build:pwa

  release-electron:
    needs:
      - release-meta
      - create-gh-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Electron binaries
        run: npx quasar build -m electron --publish onTagOrDraft
        env:
          ELECTRON_BUILD_ARCHES: x64
          ELECTRON_RELEASE_OWNER: ${{ github.repository_owner }}
          ELECTRON_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Electron workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sync2-electron-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.yml
            dist/electron/Packaged/*.blockmap

  release-electron-macos:
    needs:
      - release-meta
      - create-gh-release
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-meta.outputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Report macOS signing secrets
        id: mac_signing
        shell: bash
        env:
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing=0
          for name in MACOS_CSC_LINK MACOS_CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "Missing $name. macOS auto-update needs a signed and notarized release." >&2
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Continuing with unsigned macOS assets for manual download. Do not rely on auto-update for these assets." >&2
          fi
          echo "available=$([ "$missing" -eq 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Build unsigned Electron binaries
        if: steps.mac_signing.outputs.available != 'true'
        run: npx quasar build -m electron --publish onTagOrDraft
        env:
          ELECTRON_BUILD_ARCHES: x64,arm64
          ELECTRON_RELEASE_OWNER: ${{ github.repository_owner }}
          ELECTRON_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON_PATH: python3
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build signed Electron binaries
        if: steps.mac_signing.outputs.available == 'true'
        run: npx quasar build -m electron --publish onTagOrDraft
        env:
          ELECTRON_BUILD_ARCHES: x64,arm64
          ELECTRON_RELEASE_OWNER: ${{ github.repository_owner }}
          ELECTRON_RELEASE_REPO: ${{ github.event.repository.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON_PATH: python3
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Upload Electron workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sync2-electron-macos
          if-no-files-found: error
          path: |
            dist/electron/Packaged/*.dmg
            dist/electron/Packaged/*.zip
            dist/electron/Packaged/*.yml
            dist/electron/Packaged/*.blockmap
