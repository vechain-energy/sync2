name: Release native version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v2.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  create-gh-release:
    needs: release-meta
    runs-on: ubuntu-latest
    steps:
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: Sync2 ${{ needs.release-meta.outputs.tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-electron:
    needs:
      - release-meta
      - create-gh-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build Electron binaries
        run: npx quasar build -m electron
        env:
          ELECTRON_BUILD_ARCHES: x64
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --openssl-legacy-provider
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Electron workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync2-electron-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.yml
            dist/electron/Packaged/*.blockmap

  release-electron-macos:
    needs:
      - release-meta
      - create-gh-release
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Build Electron binaries
        run: npx quasar build -m electron
        env:
          ELECTRON_BUILD_ARCHES: x64,arm64
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --openssl-legacy-provider
          PYTHON_PATH: python3
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Electron workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sync2-electron-macos
          if-no-files-found: error
          path: |
            dist/electron/Packaged/*.dmg
            dist/electron/Packaged/*.zip
            dist/electron/Packaged/*.yml
            dist/electron/Packaged/*.blockmap
